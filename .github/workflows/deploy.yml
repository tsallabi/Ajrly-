name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - claude/spreadsheet-system-redesign-c5bi2r
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No build step: this is a dependency-free static app served from the repo root.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ajrly-os
          directory: "."
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
