name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - claude/spreadsheet-system-redesign-c5bi2r
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      # Surfaced from secrets so we can gate the deploy without failing the
      # check when Cloudflare isn't configured yet.
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip notice (Cloudflare not configured)
        if: ${{ env.CF_API_TOKEN == '' || env.CF_ACCOUNT_ID == '' }}
        run: |
          echo "::notice title=Cloudflare deploy skipped::Set the CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets to enable automatic deploys. See docs/deploy-cloudflare.md."

      # No build step: this is a dependency-free static app served from the repo root.
      - name: Deploy to Cloudflare Pages
        if: ${{ env.CF_API_TOKEN != '' && env.CF_ACCOUNT_ID != '' }}
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ajrly-os
          directory: "."
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
