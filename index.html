<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="منظومة أجرلي المتكاملة — إدارة المهام، المحتوى، وملاك العقارات" />
  <title>Ajrly OS — منظومة أجرلي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/css/styles.css?v=97" />
  <link rel="stylesheet" href="./assets/css/analytics.css?v=97" />
  <link rel="stylesheet" href="./assets/css/team.css?v=97" />
  <link rel="stylesheet" href="./assets/css/support.css?v=97" />
  <link rel="stylesheet" href="./assets/css/performance.css?v=97" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 240 240'%3E%3Crect width='240' height='240' rx='48' fill='%231a5cff'/%3E%3Ccircle cx='100' cy='145' r='50' fill='none' stroke='white' stroke-width='26'/%3E%3Cline x1='150' y1='95' x2='150' y2='195' stroke='white' stroke-width='26' stroke-linecap='round'/%3E%3Ccircle cx='100' cy='145' r='15' fill='white'/%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 240 240'%3E%3Crect width='240' height='240' rx='48' fill='%231a5cff'/%3E%3Ccircle cx='100' cy='145' r='50' fill='none' stroke='white' stroke-width='26'/%3E%3Cline x1='150' y1='95' x2='150' y2='195' stroke='white' stroke-width='26' stroke-linecap='round'/%3E%3Ccircle cx='100' cy='145' r='15' fill='white'/%3E%3C/svg%3E" />
</head>
<body data-theme="light">
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand__logo"><img src="./assets/img/ajrly-key.svg" alt="Ajrly" /></div>
        <div class="brand__text">
          <span class="brand__name">Ajrly <span>OS</span></span>
          <span class="brand__tag" data-i18n="brand.tagline">منظومة التشغيل المتكاملة</span>
        </div>
      </div>

      <!-- nav is rendered dynamically from the module registry (app.js) -->
      <nav class="nav" id="nav"></nav>

      <div class="sidebar__footer">
        <div class="user-chip">
          <div class="user-chip__avatar">T</div>
          <div class="user-chip__meta">
            <span class="user-chip__name">Tarek</span>
            <span class="user-chip__role" data-i18n="user.role">المالك</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <button class="icon-btn" id="menuToggle" aria-label="menu">☰</button>
        <div class="topbar__title">
          <h1 id="pageTitle">لوحة التحكم</h1>
          <p id="pageSubtitle" class="muted"></p>
        </div>
        <div class="topbar__actions">
          <div class="search">
            <span class="search__icon">🔎</span>
            <input id="globalSearch" type="search" data-i18n-ph="search.placeholder" placeholder="بحث..." />
          </div>
          <button class="icon-btn" id="langToggle" title="Language">ع/EN</button>
          <button class="icon-btn" id="themeToggle" title="Theme">🌙</button>
        </div>
      </header>

      <main class="content" id="view"></main>
    </div>
  </div>

  <!-- Modal host -->
  <div class="modal-host" id="modalHost" hidden></div>
  <div class="toast-host" id="toastHost"></div>

  <script type="module" src="./assets/js/app.js?v=97"></script>
</body>
</html>
