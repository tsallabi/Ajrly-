# Cloudflare Pages configuration for Ajrly OS
# Static SPA, no build step. Pages Functions (if present) are auto-detected
# from the /functions directory at the project root.
name = "ajrly"
pages_build_output_dir = "."
compatibility_date = "2026-06-01"

# Enable Node.js compatibility APIs for any Pages Functions in /functions.
compatibility_flags = ["nodejs_compat"]

# ============================================================
# Cloud backend bindings (provisioned).
# Phase 1: D1 + KV (auth, data, tickets, performance).
# Phase 2 (presence/live-chat): uncomment the Durable Object + migration
# once core cloud is verified.
# ============================================================
[[d1_databases]]
binding = "DB"
database_name = "ajrly"
database_id = "6a319b33-1f27-4afa-97cd-265dc660f2f1"

[[kv_namespaces]]
binding = "KV"
id = "685734c205d14d5e98ccc476d3f90115"

# Business Assets file storage (R2 bucket "ajrly-assets").
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "ajrly-assets"

[vars]
SESSION_SECRET = "1a3ad50e15e9241c137411d0f3c9f7c9a1eff4ea32af4cd4d5dfa42a8fd6676f"

